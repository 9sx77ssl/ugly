name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            archive: tar.gz
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            archive: tar.gz
          # macOS
          - os: macos-latest
            target: x86_64-apple-darwin
            archive: tar.gz
          - os: macos-latest
            target: aarch64-apple-darwin
            archive: tar.gz
          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            archive: zip
          - os: windows-latest
            target: aarch64-pc-windows-msvc
            archive: zip

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release
        run: cargo build --release --target ${{ matrix.target }} --verbose

      - name: Package artifact
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          OS_NAME=""
          case "${{ matrix.target }}" in
            *-linux-*)    OS_NAME="linux" ;;
            *-apple-*)    OS_NAME="macos" ;;
            *-windows-*)  OS_NAME="windows" ;;
          esac

          ARCHIVE_NAME="ugly-$TAG-${{ matrix.target }}-$(echo $OS_NAME | tr '[:upper:]' '[:lower:]')"

          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            if [[ "$OS_NAME" == "windows" ]]; then
              cp "target/${{ matrix.target }}/release/ugly.exe" "$ARCHIVE_NAME/ugly.exe" 2>/dev/null || true
              mkdir -p "$ARCHIVE_NAME"
              cp "target/${{ matrix.target }}/release/ugly.exe" "$ARCHIVE_NAME/" || true
            fi
            # Create zip
            7z a "$ARCHIVE_NAME.zip" "$ARCHIVE_NAME/" 2>/dev/null || true
          else
            mkdir -p "$ARCHIVE_NAME"
            cp "target/${{ matrix.target }}/release/ugly" "$ARCHIVE_NAME/" 2>/dev/null || true
            tar -czf "$ARCHIVE_NAME.tar.gz" "$ARCHIVE_NAME/"
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
          retention-days: 5

  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"

          # Collect all artifacts
          FILES=""
          for f in artifacts/*/*; do
            FILES="$FILES $f"
          done

          gh release create "$TAG" $FILES \
            --title "ugly $TAG" \
            --generate-notes \
            --draft=false
