name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            os_name: linux
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            os_name: linux
          - os: macos-latest
            target: x86_64-apple-darwin
            os_name: macos
          - os: macos-latest
            target: aarch64-apple-darwin
            os_name: macos
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            os_name: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cross-compile deps (Linux ARM64)
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu
          echo "CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER=aarch64-linux-gnu-gcc" >> $GITHUB_ENV

      - name: Cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          DIR="ugly-$TAG-${{ matrix.target }}-${{ matrix.os_name }}"
          mkdir -p "$DIR"

          if [[ "${{ matrix.os_name }}" == "windows" ]]; then
            cp "target/${{ matrix.target }}/release/ugly.exe" "$DIR/" || true
            7z a "${DIR}.zip" "$DIR/"
          else
            cp "target/${{ matrix.target }}/release/ugly" "$DIR/" 2>/dev/null || true
            chmod +x "$DIR/ugly"
            tar -czf "${DIR}.tar.gz" "$DIR/"
          fi

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.tar.gz"
          retention-days: 5
        if: matrix.os_name != 'windows'

      - name: Upload (Windows)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: "*.zip"
          retention-days: 5
        if: matrix.os_name == 'windows'

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts/ -type f

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${{ github.ref_name }}"
          FILES=$(find artifacts/ -type f -name '*.tar.gz' -o -name '*.zip' | tr '\n' ' ')

          gh release create "$TAG" $FILES \
            --title "ugly $TAG" \
            --generate-notes \
            --draft=false
